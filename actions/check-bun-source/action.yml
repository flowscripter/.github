name: check-bun-source
description: 'Check Bun Source'
inputs:
  codecov-token:
    description: 'Codecov token'
    required: false # if not provided codecov will not be run
runs:
  using: "composite"
  steps:
    - name: Checkout source
      uses: actions/checkout@v6
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "latest"
    - name: Bun Install
      run: bun ci
      shell: bash
    - name: Build
      run: bun run build
      shell: bash
    - name: Lint
      run: bunx oxlint index.ts src/ tests/
      shell: bash 
    - name: Format
      run: bunx oxfmt --check
      shell: bash 
    - name: Generate docs
      run: bunx typedoc index.ts
      shell: bash
      if: hashFiles('index.ts') != ''
    - name: Check coverage
      run: bun test --coverage --coverage-reporter=lcov > coverage.lcov
      shell: bash
      if: hashFiles('tests/**') != ''
    - name: Publish coverage report
      uses: codecov/codecov-action@v6
      with:
        files: coverage.lcov
      env:
        CODECOV_TOKEN: ${{ inputs.codecov-token }}
      if: inputs.codecov-token != '' && hashFiles('tests/**') != ''
