name: check-bun-rust-source
description: 'Check Bun and Rust Source'
inputs:
  codecov-token:
    description: 'Codecov token'
    required: false # if not provided codecov will not be run
runs:
  using: "composite"
  steps:
    - name: Checkout source
      uses: actions/checkout@v6
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "latest"
    - name: Install packages
      run: bun ci
      shell: bash
    - name: Setup and Run Clippy and Cargo Audit
      run: |
        rustup default nightly
        rustup component add clippy
        cargo clippy
        cargo install cargo-audit
        cargo audit
      shell: bash
    - name: Check for build script
      id: check-build
      run: |
        if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
          echo "has-build=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-build=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
    - name: Build
      if: steps.check-build.outputs.has-build == 'true'
      run: bun run build
      shell: bash
    - name: Lint
      run: bunx oxlint index.ts src/ tests/
      shell: bash 
    - name: Format
      run: |
        bunx oxfmt --check
        rustup component add rustfmt
        cargo fmt -- --check
      shell: bash 
    - name: Generate docs
      run: bunx typedoc index.ts
      shell: bash
    - name: Compile
      run: cargo build --release
      shell: bash
    - name: Check coverage
      run: bun test --coverage --coverage-reporter=lcov > coverage.lcov
      shell: bash
    - name: Publish coverage report
      uses: codecov/codecov-action@v6
      with:
        files: coverage.lcov
      env:
        CODECOV_TOKEN: ${{ inputs.codecov-token }}
      if: inputs.codecov-token != ''
