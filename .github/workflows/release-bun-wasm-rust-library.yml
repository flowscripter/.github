name: release-bun-wasm-rust-library
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false # if not provided codecov will not be run
      PUSH_TO_MAIN_TOKEN:
        required: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Bun and Rust (WASM) Source
        uses: flowscripter/.github/actions/check-bun-wasm-rust-source@v1
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Run Bun and Rust (WASM) Tests
        uses: flowscripter/.github/actions/run-bun-wasm-rust-tests@v1
  release:
    runs-on: ubuntu-latest
    needs:
      - test
      - check
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      pages: write
    concurrency:
      group: "release"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Install packages
        run: bun ci
        shell: bash
      - name: Wasm Pack Install
        run: cargo install wasm-pack
        shell: bash
      - name: Check for build script
        id: check-build
        run: |
          if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
            echo "has-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-build=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: Build
        if: steps.check-build.outputs.has-build == 'true'
        run: bun run build
        shell: bash
      - name: Perform release
        id: perform_release
        continue-on-error: true
        run: |
          cat <<EOT > .releaserc
          ---
          branches:
            - main
          plugins:
            - - "@semantic-release/commit-analyzer"
              - preset: conventionalcommits
                releaseRules:
                  - type: docs
                    release: patch
                  - type: chore
                    release: patch
            - - "@semantic-release/release-notes-generator"
              - preset: conventionalcommits
            - - "@semantic-release/exec"
              - publishCmd: "echo tag=v\${nextRelease.version} >> $GITHUB_OUTPUT"
            - - "@semantic-release/github"
              - successComment: false
                failComment: false
            - - "@semantic-release/npm"
            - - "@semantic-release/git"
              - assets:
                - Cargo.toml
                - Cargo.lock
                - package.json
                - bun.lock
          EOT
          bun add --no-save conventional-changelog-conventionalcommits @semantic-release/exec @semantic-release/git
          bunx semantic-release
        shell: bash
        env:
          GITHUB_ACTION: yes
          GITHUB_TOKEN: ${{ secrets.PUSH_TO_MAIN_TOKEN }}
      - name: Determine release tag
        id: release
        run: |
          TAG=$(git tag --points-at HEAD | head -n1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.perform_release.outcome }}" = "failure" ] && [ -z "$TAG" ]; then
            echo "Release step failed and no tag was created - failing job" >&2
            exit 1
          fi
        shell: bash
      - name: Generate docs
        if: steps.release.outputs.tag != ''
        run: bunx typedoc index.ts
        shell: bash
      - name: Setup Pages
        if: steps.release.outputs.tag != ''
        uses: actions/configure-pages@v6
      - name: Upload artifact
        if: steps.release.outputs.tag != ''
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/'
      - name: Deploy to GitHub Pages
        if: steps.release.outputs.tag != ''
        id: deployment
        uses: actions/deploy-pages@v5
