name: release-bun-wasm-rust-library
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false # if not provided codecov will not be run
      PUSH_TO_MAIN_TOKEN:
        required: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Bun and Rust (WASM) Source
        uses: flowscripter/.github/actions/check-bun-wasm-rust-source@v1
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Run Bun and Rust (WASM) Tests
        uses: flowscripter/.github/actions/run-bun-wasm-rust-tests@v1
  release:
    runs-on: ubuntu-latest
    needs:
      - test
      - check
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      pages: write
    concurrency:
      group: "release"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Bun Install
        run: bun install
        shell: bash
      - name: Set up Node.js - Needed for semantic-release even though we use Bun as it checks for the node version
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - name: Perform release
        id: release
        run: |
          cat <<EOT > .releaserc
          ---
          branches:
            - main
          plugins:
            - - "@semantic-release/commit-analyzer"
              - preset: conventionalcommits
                releaseRules:
                  - type: docs
                    release: patch
                  - type: chore
                    release: patch
            - - "@semantic-release/release-notes-generator"
              - preset: conventionalcommits
            - - "@semantic-release/exec"
              - verifyConditionsCmd: "wasm-pack build --target web --release --no-pack && rm pkg/.gitignore"
                publishCmd: "echo tag=v\${nextRelease.version} >> $GITHUB_OUTPUT"
            - - "@semantic-release/github"
            - - "@semantic-release/npm"
            - - "@semantic-release/git"
              - assets: 
                - Cargo.toml
                - Cargo.lock
                - package.json
                - bun.lock
          EOT
          cargo install wasm-pack
          bun add --no-save conventional-changelog-conventionalcommits @semantic-release/exec @semantic-release/git
          bunx semantic-release
        shell: bash
        env:
          GITHUB_ACTION: yes
          GITHUB_TOKEN: ${{ secrets.PUSH_TO_MAIN_TOKEN }}
      - name: Install Bun
        if: steps.release.outputs.tag != ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Generate docs
        if: steps.release.outputs.tag != ''
        run: bunx typedoc --readme none index.ts
        shell: bash
      - name: Setup Pages
        if: steps.release.outputs.tag != ''
        uses: actions/configure-pages@v6
      - name: Upload artifact
        if: steps.release.outputs.tag != ''
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/'
      - name: Deploy to GitHub Pages
        if: steps.release.outputs.tag != ''
        id: deployment
        uses: actions/deploy-pages@v5
