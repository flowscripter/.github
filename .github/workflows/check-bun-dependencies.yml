name: check-bun-dependencies
on:
  workflow_call:
    secrets:
      CREATE_PR_TOKEN:
        required: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Update dependencies
        run: bun update --latest
        shell: bash
      - name: Check minimum release age
        id: install
        continue-on-error: true
        run: bun install --frozen-lockfile --minimum-release-age 259200
        shell: bash
      - name: Run tests
        run: bun test
        shell: bash
        if: steps.install.outcome == 'success' && hashFiles('tests/**') != ''
      - name: Create PR
        id: create-pr
        if: steps.install.outcome == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CREATE_PR_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            chore: update dependencies
          branch: update-dependencies
      - name: Enable Pull Request Automerge
        if: steps.install.outcome == 'success' && steps.create-pr.outputs.pull-request-operation == 'created'
        run: gh pr merge --squash --auto ${{ steps.create-pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.CREATE_PR_TOKEN }}
